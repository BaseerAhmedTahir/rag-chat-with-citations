# Local full-stack: backend (FastAPI + models) + frontend (Next.js).
# Production deploys backend to Hugging Face Spaces and frontend to Vercel.
#
#   GROQ_API_KEY=... docker compose up --build
#
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:7860"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RETRIEVER_KIND: ${RETRIEVER_KIND:-hybrid_rerank}
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
